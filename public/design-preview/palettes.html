<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tray — Landing palette picker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #111;
      color: #eee;
      padding: 24px 16px 48px;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 8px; }
    p.hint { margin: 0 0 24px; color: #999; font-size: 0.9rem; max-width: 52rem; line-height: 1.5; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      max-width: 1400px;
    }
    .card {
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover { transform: translateY(-2px); }
    .card.is-selected {
      border-color: #fff;
      box-shadow: 0 0 0 1px #fff, 0 12px 40px rgba(0,0,0,0.45);
    }
    .card.is-recommended .badge-rec { display: inline-flex; }
    .preview {
      padding: 20px 18px 16px;
      min-height: 140px;
    }
    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.12);
    }
    .badge-rec {
      display: none;
      background: #6dd4a0;
      color: #0a0f1a;
    }
    .title {
      font-size: 1.35rem;
      font-weight: 400;
      margin: 0 0 6px;
      line-height: 1.15;
    }
    .sub { font-size: 0.85rem; opacity: 0.75; margin: 0 0 14px; }
    .swatches { display: flex; gap: 6px; flex-wrap: wrap; }
    .sw {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .meta {
      padding: 12px 18px 14px;
      background: rgba(0,0,0,0.35);
      font-size: 0.8rem;
      color: #bbb;
    }
    .meta strong { color: #fff; }
    .pick-bar {
      position: sticky;
      bottom: 0;
      margin-top: 28px;
      padding: 14px 18px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      max-width: 1400px;
      font-size: 0.95rem;
    }
    .pick-bar code {
      background: #2a2a2a;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.88rem;
    }
    button.copy {
      margin-left: 12px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button.copy:hover { background: #333; }
  </style>
</head>
<body>
  <h1>Tray landing — palette A–E</h1>
  <p class="hint">
    Click a card to select (saved in <code>localStorage</code> as <code>tray-landing-palette</code>).
    Full specs: <code>docs/landing-design-options.md</code>.
    Reply to the team: <strong>I pick palette X + font N + motion medium</strong>.
  </p>

  <div class="grid" id="grid"></div>

  <div class="pick-bar" id="pickBar">
    Selected: <code id="pickLabel">none</code>
    <button type="button" class="copy" id="copyBtn">Copy reply snippet</button>
  </div>

  <script>
    const PALETTES = [
      {
        id: "A",
        name: "Pre-Monsoon Dusk",
        recommended: true,
        bg: "#0a0f1a",
        ink: "#ece8e0",
        accent: "#d4b896",
        cool: "#8eb8ff",
        swatches: ["#0a0f1a", "#121a2e", "#ece8e0", "#d4b896", "#7eb8ff", "#ff7b6e", "#b8e86a"],
        note: "Current production landing. Default recommendation.",
      },
      {
        id: "B",
        name: "Midnight Sky",
        recommended: false,
        bg: "#060a14",
        ink: "#e8f0ff",
        accent: "#ffd87a",
        cool: "#78a8ff",
        swatches: ["#060a14", "#0c1220", "#e8f0ff", "#ffd87a", "#7eb8ff", "#ff7b6e", "#b8e86a"],
        note: "Student-demo night + gold accent.",
      },
      {
        id: "C",
        name: "Slate Ember",
        recommended: false,
        bg: "#0d0c0a",
        ink: "#f2ebe3",
        accent: "#e8a86a",
        cool: "#9ec4ff",
        swatches: ["#0d0c0a", "#16140f", "#f2ebe3", "#e8a86a", "#7eb8ff", "#ff7b6e", "#b8e86a"],
        note: "Warmer stone dusk, less blue.",
      },
      {
        id: "D",
        name: "Graphite Signal",
        recommended: false,
        bg: "#0b0e14",
        ink: "#eef1f7",
        accent: "#ffb22a",
        cool: "#cdfa50",
        swatches: ["#0b0e14", "#11151d", "#eef1f7", "#cdfa50", "#7eb8ff", "#ff7b6e", "#b8e86a"],
        note: "Admin-adjacent graphite + chartreuse.",
      },
      {
        id: "E",
        name: "Monsoon Paper",
        recommended: false,
        bg: "#f7f3ea",
        ink: "#1a140e",
        accent: "#c43d2f",
        cool: "#2a5db8",
        swatches: ["#f7f3ea", "#fffaf0", "#1a140e", "#c43d2f", "#2a5db8", "#ff7b6e", "#5e7a38"],
        note: "Light editorial — highest rebuild cost.",
      },
    ];

    const STORAGE_KEY = "tray-landing-palette";
    const grid = document.getElementById("grid");
    const pickLabel = document.getElementById("pickLabel");
    const copyBtn = document.getElementById("copyBtn");

    let selected = localStorage.getItem(STORAGE_KEY) || "A";

    function render() {
      grid.innerHTML = "";
      PALETTES.forEach((p) => {
        const card = document.createElement("article");
        card.className = "card" + (p.id === selected ? " is-selected" : "") + (p.recommended ? " is-recommended" : "");
        card.dataset.id = p.id;
        const swHtml = p.swatches.map((c) => `<span class="sw" style="background:${c}" title="${c}"></span>`).join("");
        card.innerHTML = `
          <div class="preview" style="background:linear-gradient(165deg, ${p.bg} 0%, ${p.bg} 100%); color:${p.ink}">
            <div class="badge-row">
              <span class="badge">Palette ${p.id}</span>
              <span class="badge badge-rec">Recommended</span>
            </div>
            <h2 class="title" style="font-family: Georgia, serif">Tray</h2>
            <p class="sub">${p.name}</p>
            <div class="swatches">${swHtml}</div>
          </div>
          <div class="meta"><strong>${p.note}</strong></div>
        `;
        card.addEventListener("click", () => {
          selected = p.id;
          localStorage.setItem(STORAGE_KEY, selected);
          render();
        });
        grid.appendChild(card);
      });
      pickLabel.textContent = `palette ${selected}`;
    }

    copyBtn.addEventListener("click", () => {
      const text = `I pick palette ${selected} + font 1 + motion medium`;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = "Copied!";
        setTimeout(() => { copyBtn.textContent = "Copy reply snippet"; }, 1500);
      });
    });

    render();
  </script>
</body>
</html>
